<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Screen တစ်ခုလုံးကို လိမ္မော်ရောင်ဖြစ်စေရန် */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            background-color: #FF8C00; /* လိမ္မော်ရောင် */
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Card ပုံစံ */
        .card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            color: white;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #ff4d4d;
            font-size: 12px;
            text-decoration: none;
        }

        /* Setting ကို အောက်ခြေမှာ Feature တစ်ခုအနေနဲ့ ထားရန် */
        .footer-settings {
            margin-top: auto;
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
        }

        .settings-button {
            background-color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .settings-button img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">Other Screen</div>

        <div class="card">
            <div style="font-weight: bold; font-size: 18px;">min</div>
            <div style="opacity: 0.8;">Thank</div>
            <a href="#" class="remove-btn">Remove [x]</a>
        </div>

        <div class="footer-settings">
            <div class="settings-button">
                <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" alt="Settings">
            </div>
        </div>
    </div>

</body>
</html>
